<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dakunin | Personal Hub</title>
    <style>
        /* Общие стили и сброс */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Оболочка сайта */
        .wrapper {
            max-width: 700px;
            width: 100%;
            margin-top: 40px;
        }

        /* Шапка профиля */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffaa 0%, #0077ff 100%);
            margin: 0 auto 15px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
            border: 3px solid #1e293b;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        header p {
            color: #64748b;
            font-size: 1rem;
        }

        /* Сетка блогов/интересов */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        max-width: 500px {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #151922;
            border: 1px solid #222b3c;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #00ffaa;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Кнопки-ссылки (Соцсети / Связь) */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #151922;
            border: 1px solid #222b3c;
            padding: 16px;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: #00ffaa;
            color: #0d0e12;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
            transform: scale(1.01);
        }

        /* Подвал */
        footer {
            text-align: center;
            margin-top: auto;
            padding: 20px 0;
            color: #475569;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="avatar-placeholder"></div>
            <h1>DAKUNIN</h1>
            <p>Разработка • Мото • Гейминг</p>
        </header>

        <div class="grid">
            <div class="card">
                <h3>🎮 CS2 Gameplay</h3>
                <p>Тренирую мувмент, оттачиваю пики и собираю топовые сеты.</p>
